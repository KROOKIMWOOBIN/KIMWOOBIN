<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    {% assign page_title = site.title %}
    {% if page.title and page.title != site.title %}
      {% assign page_title = page.title | append: ' | ' | append: site.title %}
    {% endif %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
    <meta property="og:title" content="{{ page_title }}">
    <meta property="og:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>
    {% include header.html %}
    <main id="main" class="site-main">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
